<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Assist</title>
  <meta name="description" content="Organize, search, and manage your AI prompts in one place." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="#" class="logo">
        <i class="fa-solid fa-bolt"></i>
        <span>Prompt Assist</span>
      </a>
      <div class="header-actions">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" placeholder="Search prompts…" />
        </div>
        <button id="newPromptBtn" class="btn-primary">
          <i class="fa-solid fa-plus"></i> New Prompt
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="top-bar">
      <div>
        <h1>Your Prompts</h1>
        <p class="subtitle">Browse, copy, and organize your collection.</p>
      </div>
      <div class="stats-row">
        <div class="stat-pill"><strong id="totalPrompts">0</strong> prompts</div>
        <div class="stat-pill fav"><strong id="favoriteCount">0</strong> favorites</div>
      </div>
    </section>

    <section class="filter-bar">
      <button class="chip active" data-category="All">All</button>
      <button class="chip" data-category="Coding"><i class="fa-solid fa-code"></i> Coding</button>
      <button class="chip" data-category="Career"><i class="fa-solid fa-bullseye"></i> Career</button>
      <button class="chip" data-category="Writing"><i class="fa-solid fa-pen-nib"></i> Writing</button>
      <button class="chip" data-category="Research"><i class="fa-solid fa-flask"></i> Research</button>
      <button class="chip" data-category="Design"><i class="fa-solid fa-palette"></i> Design</button>
      <button class="chip" data-category="Favorites"><i class="fa-solid fa-star"></i> Favorites</button>
    </section>

    <section class="cards" id="cardsContainer"></section>

    <div id="emptyState" class="empty-state">
      <i class="fa-regular fa-folder-open"></i>
      <h3>Nothing here yet</h3>
      <p>No prompts match your current filter.</p>
    </div>
  </main>

  <!-- Add / Edit Modal -->
  <div class="overlay" id="modalOverlay">
    <div class="panel">
      <div class="panel-header">
        <h2 id="modalTitle">Add a Prompt</h2>
        <button class="close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="promptForm">
        <label for="promptTitle">Title</label>
        <input id="promptTitle" type="text" placeholder="e.g. Code Review Helper" required />
        <label for="promptCategory">Category</label>
        <select id="promptCategory">
          <option>Coding</option>
          <option>Career</option>
          <option>Writing</option>
          <option>Research</option>
          <option>Design</option>
        </select>
        <label for="promptContent">Prompt</label>
        <textarea id="promptContent" rows="6" placeholder="Write your prompt here…" required></textarea>
        <button type="submit" class="btn-primary btn-block">
          <i class="fa-solid fa-check"></i> Save Prompt
        </button>
      </form>
    </div>
  </div>

  <!-- View Full Prompt -->
  <div class="overlay" id="expandOverlay">
    <div class="panel panel-wide">
      <div class="panel-header">
        <h2 id="expandTitle">Prompt</h2>
        <button class="close-btn" id="closeExpandBtn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="expand-body" id="expandBody"></div>
      <div class="panel-footer">
        <button class="btn-outline" id="expandCopyBtn">
          <i class="fa-regular fa-copy"></i> Copy to clipboard
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toastMsg">Success</span>
  </div>

  <script src="prompts-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
