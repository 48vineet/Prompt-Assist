<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Assist</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <i class="fa-solid fa-box"></i>
      <h1>Prompt Assist</h1>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="Search prompts...">
      </div>
      <button id="newPromptBtn">
        New Prompt
      </button>
    </div>
  </header>

  <!-- Main -->
  <main>
    <section class="categories">
      <button class="category-btn active" data-category="All">
        All
      </button>
      <button class="category-btn" data-category="Coding">
        Coding
      </button>
      <button class="category-btn" data-category="Career">
        Career
      </button>
      <button class="category-btn" data-category="Writing">
        Writing
      </button>
      <button class="category-btn" data-category="Research">
        Research
      </button>
      <button class="category-btn" data-category="Design">
        Design
      </button>
    </section>

    <!-- Cards -->
    <section class="cards" id="cardsContainer">
    </section>
    <!-- Empty State -->
    <div id="emptyState" class="empty-state">
      No prompts yet. Create your first prompt.
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Prompt</h2>
        <button id="closeModalBtn">
          ✕
        </button>
      </div>
      <form id="promptForm">
        <label>
          Prompt Title
        </label>
        <input id="promptTitle" type="text" placeholder="Enter title" required>
        <label>
          Category
        </label>
        <select id="promptCategory">
          <option>
            Coding
          </option>
          <option>
            Career
          </option>
          <option>
            Writing
          </option>
          <option>
            Research
          </option>
          <option>
            Design
          </option>
        </select>
        <label>
          Prompt
        </label>
        <textarea id="promptContent" rows="6" required></textarea>
        <button type="submit">
          Save Prompt
        </button>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
